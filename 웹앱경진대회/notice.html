<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>학교도우미 - 공지사항</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- 공통 스타일 -->
    <link rel="stylesheet" href="./css/style.css" />
    <style>
        /* 공지사항 전용 스타일 */

        main {
            padding: 16px;
        }

        .notice-wrap {
            max-width: 900px;
            margin: 0 auto;
        }

        .notice-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
        }

        .notice-header h2 {
            margin: 0;
            font-size: 22px;
        }

        .notice-header .small {
            text-align: right;
        }

        .notice-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .notice-item {
            border-bottom: 1px solid #e5e7eb;
        }

        .notice-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px;
            cursor: pointer;
        }

        .notice-title-row:hover {
            background: #f9fafb;
        }

        .notice-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
            color: #6b7280;
        }

        .notice-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            background: #eef3ff;
            color: #3a57e8;
            font-size: 11px;
        }

        .notice-date {
            font-size: 12px;
            color: #9ca3af;
        }

        .notice-title {
            font-size: 15px;
            font-weight: 600;
        }

        .notice-body {
            display: none;
            padding: 8px 4px 12px 4px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-line;
            color: #374151;
        }

        .notice-item.open .notice-body {
            display: block;
        }

        .notice-item.open .notice-title-row {
            background: #f3f4ff;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            margin-top: 14px;
            font-size: 13px;
            color: #4b5563;
            text-decoration: none;
        }

        .back-link span {
            margin-left: 2px;
        }
    </style>
</head>

<body>
    <header>
        <a href="./home.html">
            <h1>학교도우미</h1>
        </a>
        <div class="small">sdh · 공지사항</div>
    </header>

    <main>
        <section class="card notice-wrap">
            <div class="notice-header">
                <h2>공지사항</h2>
                <div class="small">
                    학교 생활과 관련된 주요 안내 사항을 모아둔 페이지입니다.<br />
                    제목을 클릭하면 자세한 내용을 볼 수 있습니다.
                </div>
            </div>

            <ul class="notice-list" id="noticeList">
                <!-- JS에서 채워 넣음 -->
            </ul>

            <a href="./home.html" class="back-link">
                ← <span>학교도우미 홈으로 돌아가기</span>
            </a>
        </section>
    </main>

    <script>
        // 공지 데이터 (필요하면 여기만 수정해서 여러 개 추가 가능)
        const notices = [
            {
                id: 1,
                title: "일정·공지 확인 방식 개선 안내",
                category: "안내사항",
                date: "2025-11-30",
                content: `안녕하세요, 학생 여러분.

최근 학교 생활과 관련된 다양한 일정 및 공지 사항을 확인하는 과정에서 불편함이 있다는 의견이 많아, 학교에서는 학생들이 더 편하게 정보를 확인할 수 있도록 공지 전달 방식을 개선하고자 합니다.

현재 많은 학생들이 일정표나 수업 시간표, 수행평가 일정, 학사 일정을 확인하기 위해
여러 공지 채널을 찾아보거나, 화면을 캡처해 보관하거나, 배경화면으로 설정하는 방식으로 정보를 관리하고 있습니다.
이러한 방식은 다음과 같은 불편함이 있다는 의견이 접수되었습니다.

✔ 학생들이 겪는 불편 사항

일정이 자주 변경되어 캡처한 이미지가 금방 오래됨  
학년별·반별 공지를 각자 다른 공간에서 찾아야 함  
중요한 학사 일정이 한눈에 정리되어 있지 않음  
일정 정보를 확인하기 위해 여러 플랫폼을 왔다 갔다 해야 함  
시험 일정, 수행평가 일정, 행사 일정을 정확히 구분하기 어려움  

학교에서는 이러한 불편 사항을 해소하기 위해
앞으로 일정 정보와 공지를 더 쉽게 확인할 수 있도록 통합 안내 체계를 준비하고 있습니다.

📌 앞으로 진행될 개선 내용

주요 학사 일정 및 행사 일정을 한곳에서 확인 가능하도록 정리  
학년별·반별 공지 구분을 개선하여 학생들이 필요한 정보만 빠르게 확인 가능하도록 개선  
시간표 및 주요 변경 사항을 더 빠르게 전달할 수 있는 방식 준비  
불필요한 중복 안내를 줄이고 간소화된 공지 구조 구축  

학생 여러분의 학교 생활이 더 편리해질 수 있도록 학교에서도 지속적으로 확인하고 개선해 나가겠습니다.  
추가로 건의하거나 필요하다고 느끼는 사항이 있다면 언제든지 학교로 알려주시기 바랍니다.

감사합니다.  
서울디지텍고등학교 행정실`
            },

            {
                id: 2,
                title: "시간표 관리 기능 개선 안내",
                category: "기능개선",
                date: "2025-12-02",
                content: `학교 도우미 서비스를 이용해 주는 학생 여러분께 감사드립니다.

학생 여러분의 건의 사항을 반영하여 시간표 관리 기능을 개선 중입니다.

현재 개발 중인 기능은 다음과 같습니다.

✔ 과목 색상 표시 기능
✔ 시험 기간 표시 기능
✔ 수행평가 일정 구분 기능
✔ 시간표 보기 방식 개선

앞으로 더욱 편리한 이용 환경을 제공하기 위해 지속적으로 개선해 나가겠습니다.

감사합니다.`
            },

            {
                id: 3,
                title: "모바일 화면 최적화 업데이트 안내",
                category: "업데이트",
                date: "2025-12-04",
                content: `학생들의 스마트폰 이용 환경을 개선하기 위해 모바일 화면 최적화를 진행하고 있습니다.

✔ 버튼 잘림 현상 수정 중
✔ 모바일 화면 비율 자동 조정 적용
✔ 터치 입력 오류 개선
✔ 확대/축소 오류 수정

빠른 시일 내에 업데이트하여 보다 편리하게 이용할 수 있도록 하겠습니다.`
            },

            {
                id: 4,
                title: "공지사항 정렬 기능 추가 예정",
                category: "안내사항",
                date: "2025-12-06",
                content: `공지사항을 더 편리하게 확인할 수 있도록 새로운 기능이 추가될 예정입니다.

추가 예정 기능 안내:

✔ 날짜별 정렬
✔ 중요 공지 상단 고정
✔ 학년별 공지 분류
✔ 검색 기능 도입

학생 여러분이 공지를 더욱 빠르게 확인할 수 있도록 개선하겠습니다.`
            },

            {
                id: 5,
                title: "건의함 운영 방식 안내",
                category: "공지",
                date: "2025-12-08",
                content: `학교 도우미 건의함은 학생들의 의견을 반영하기 위한 창구입니다.

건의하실 때 유의해 주세요.

✔ 불편 사항은 구체적으로 작성
✔ 사용 환경(PC / 모바일) 함께 기재
✔ 같은 내용 반복 건의는 삭제될 수 있음
✔ 욕설, 비방, 장난성 건의는 제한될 수 있음

여러분의 소중한 의견을 항상 귀 기울여 듣겠습니다.

감사합니다.`
            }
        ];

        const listEl = document.getElementById("noticeList");

        function renderNotices() {
            listEl.innerHTML = "";
            notices.forEach(notice => {
                const li = document.createElement("li");
                li.className = "notice-item";
                li.dataset.id = notice.id;

                li.innerHTML = `
                <div class="notice-title-row">
                    <div>
                        <div class="notice-meta">
                            <span class="notice-badge">${notice.category}</span>
                            <span class="notice-date">${notice.date}</span>
                        </div>
                        <div class="notice-title">${notice.title}</div>
                    </div>
                    <div class="small">자세히 보기 ▾</div>
                </div>
                <div class="notice-body">${notice.content}</div>
            `;

                li.querySelector(".notice-title-row").addEventListener("click", () => {
                    const isOpen = li.classList.contains("open");
                    // 하나만 펼치고 싶으면 아래 두 줄로 다른 것 닫기
                    document.querySelectorAll(".notice-item.open").forEach(el => {
                        if (el !== li) el.classList.remove("open");
                    });
                    li.classList.toggle("open", !isOpen);
                });

                listEl.appendChild(li);
            });
        }

        renderNotices();
    </script>
</body>

</html>
